# -- general --------------------------------------------------------------

set -g default-terminal "screen-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -s escape-time 10
set -sg repeat-time 600
set -s focus-events on
set -g history-limit 5000
set -g mouse on
set -g set-clipboard on
set-environment -g EDITOR micro

# secondary prefix
set -g prefix2 C-a
bind C-a send-prefix -2


# -- display --------------------------------------------------------------

set -g base-index 1
setw -g pane-base-index 1
setw -g automatic-rename on
set -g renumber-windows on
set -g set-titles on
set -g set-titles-string "#h | #W"
set -g display-panes-time 800
set -g display-time 1000
set -g status-interval 10
set -g monitor-activity on
set -g visual-activity off


# -- cathode theme --------------------------------------------------------

# pane borders
set -g pane-border-style "fg=#2d2d2d"
set -g pane-active-border-style "fg=#d9b98c"

# messages
set -g message-style "fg=#000000,bg=#ffb86c,bold"
set -g message-command-style "fg=#ffb86c,bg=#000000,bold"

# copy mode / selection
set -g mode-style "fg=#000000,bg=#ffb86c,bold"

# clock
set -g clock-mode-colour "#d9b98c"
set -g clock-mode-style 24

# pane indicators (prefix + q)
set -g display-panes-active-colour "#d9b98c"
set -g display-panes-colour "#d9b98c"


# -- status bar -----------------------------------------------------------

set -g status-style "fg=#b3b3b3,bg=#000000"
set -g status-left-length 40
set -g status-right-length 120

# left: [session]
set -g status-left "#[fg=#ff9e3b,bg=#000000]#[fg=#000000,bg=#ff9e3b]#S#[fg=#ff9e3b,bg=#000000]#[none] "

# right: prefix/mouse | time | date | user | host
set -g status-right "\
#{?client_prefix, ,}\
#{?mouse,󰍽 , }\
#[fg=#757575]| %R | %d %b \
#[fg=#ff9e3b,bg=#000000]#[fg=#ffffff,bg=#ff9e3b] #(whoami) #[fg=#ff9e3b,bg=#000000] #[fg=#ffffff,bg=#000000]#[fg=#000000,bg=#ffffff,bold] #h #[fg=#ffffff,bg=#000000]"

# window tabs
set -g window-status-separator ""
set -g window-status-format "#[fg=#2d2d2d,bg=#000000]#[fg=#b3b3b3,bg=#2d2d2d] #I #W#{?window_zoomed_flag,Ƶ,} #[fg=#2d2d2d,bg=#000000]"
set -g window-status-style "fg=#b3b3b3,bg=#2d2d2d"
set -g window-status-current-format "#[fg=#d9b98c,bg=#000000]#[fg=#000000,bg=#d9b98c,bold] #I #W#{?window_zoomed_flag,Ƶ,} #[fg=#d9b98c,bg=#000000]"
set -g window-status-current-style "fg=#000000,bg=#d9b98c,bold"
set -g window-status-activity-style "underscore"
set -g window-status-bell-style "fg=#ffb86c,blink,bold"
set -g window-status-last-style "fg=#d9b98c,bg=#2d2d2d"


# -- navigation -----------------------------------------------------------

# sessions
bind C-c new-session
bind C-f command-prompt -p find-session 'switch-client -t %%'
bind BTab switch-client -l

# splits (retain current path)
bind - split-window -v -c '#{pane_current_path}'
bind _ split-window -h -c '#{pane_current_path}'

# pane navigation
bind -r l select-pane -L
bind -r \; select-pane -D
bind -r p select-pane -U
bind -r \' select-pane -R
bind > swap-pane -D
bind < swap-pane -U

# pane resizing
bind -r Left  resize-pane -L 2
bind -r Down  resize-pane -D 2
bind -r Up    resize-pane -U 2
bind -r Right resize-pane -R 2

# window navigation
bind \] next-window
bind \[ previous-window
bind Tab last-window

# clear screen and history
bind -n C-l send-keys C-l \; run 'sleep 0.2' \; clear-history

# toggle mouse
bind m run "if tmux show -gv mouse | grep -q on; then tmux set -g mouse off; tmux display '󰍾 mouse off'; else tmux set -g mouse on; tmux display '󰍽 mouse on'; fi"

# edit config
bind e new-window -n "tmux.conf" sh -c '"${EDITOR:-micro}" "$HOME/.config/tmux/tmux.conf" && tmux source-file "$HOME/.config/tmux/tmux.conf" && tmux display-message "config reloaded"'

# reload config
bind r source-file "$HOME/.config/tmux/tmux.conf" \; display "config reloaded"

# clipboard (xsel/xclip/wl-copy)
if -b 'command -v xsel > /dev/null 2>&1' 'bind y run -b "tmux save-buffer - | xsel -i -b"'
if -b '! command -v xsel > /dev/null 2>&1 && command -v xclip > /dev/null 2>&1' 'bind y run -b "tmux save-buffer - | xclip -i -selection clipboard"'
if -b '[ "$XDG_SESSION_TYPE" = "wayland" ] && command -v wl-copy > /dev/null 2>&1' 'bind y run -b "tmux save-buffer - | wl-copy"'

# buffers
bind b list-buffers
bind P choose-buffer


# -- popups ---------------------------------------------------------------

# shell popup (disables mouse for native selection)
bind t display-popup -d '#{pane_current_path}' -w 80% -h 80% -E "trap 'tmux set -g mouse on' EXIT; tmux set -g mouse off; exec $SHELL"

# search buffer backward
bind f copy-mode \; send-keys C-r

# superfile
bind F display-popup -d '#{pane_current_path}' -w 80% -h 80% -E 'exec superfile'

# btop
bind a display-popup -d '#{pane_current_path}' -w 80% -h 80% -E 'exec btop'

# diff review
bind D display-popup -d '#{pane_current_path}' -w 90% -h 90% -E 'exec ~/.config/tmux/scripts/diff.sh'
